---
- name: Pre-bootstrap (asegurar Python en Rocky antes de facts)
  hosts: rocky
  gather_facts: false
  become: true
  tasks:
    - name: Asegurar Python3 en Rocky para habilitar modulos Ansible
      ansible.builtin.raw: |
        test -x /usr/bin/python3 || dnf -y install python3
      changed_when: false

- name: Bootstrap (paquetes basicos y cache de paquetes)
  hosts: lab
  become: true
  tasks:
    - name: Actualizar cache APT (Debian)
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Actualizar cache DNF (RedHat)
      ansible.builtin.dnf:
        update_cache: yes
      when: ansible_os_family == "RedHat"

    - name: Instalar paquetes comunes
      ansible.builtin.package:
        name: "{{ common_packages }}"
        state: present
