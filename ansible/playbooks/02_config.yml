---
- name: Configurar servidor web (Debian)
  hosts: web
  become: true
  tasks:
    - name: Instalar paquete web
      ansible.builtin.apt:
        name: "{{ web_package }}"
        state: present

    - name: Asegurar servicio web arrancado y habilitado
      ansible.builtin.service:
        name: "{{ web_service }}"
        state: started
        enabled: true

    - name: Publicar pagina de prueba
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        content: |
          <h1>OK - web configurada por Ansible</h1>
          <p>Host: {{ inventory_hostname }}</p>
          <p>Gestionado por Ansible</p>
        owner: root
        group: root
        mode: "0644"

- name: Configurar base de datos (Rocky)
  hosts: db
  become: true
  tasks:
    - name: Instalar MariaDB Server
      ansible.builtin.dnf:
        name: "{{ db_package }}"
        state: present

    - name: Asegurar servicio DB arrancado y habilitado
      ansible.builtin.service:
        name: "{{ db_service }}"
        state: started
        enabled: true
